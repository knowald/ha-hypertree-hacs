name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          body: "Release from [ha-hypertree](https://github.com/knowald/ha-hypertree/releases/tag/${{ github.ref_name }})"
